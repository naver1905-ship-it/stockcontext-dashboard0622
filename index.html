function layout(stocks,W,H){
  const s=[...stocks].sort((a,b)=>b.size-a.size);
  const tot=s.reduce((t,d)=>t+d.size,0);
  let cum=0,br=0;
  for(let i=0;i<s.length;i++){cum+=s[i].size;if(cum/tot>=0.55){br=i+1;break;}}
  if(!br)br=Math.ceil(s.length/2);
  const r1=s.slice(0,br),r2=s.slice(br);
  const s1=r1.reduce((t,d)=>t+d.size,0),s2=r2.reduce((t,d)=>t+d.size,0);
  const H1=H*(s1/tot);
  const res=[];let x=0;
  r1.forEach(d=>{const w=d.size/s1*W;res.push({...d,x,y:0,w:Math.max(2,w-2),h:Math.max(2,H1-2)});x+=w;});
  x=0;r2.forEach(d=>{const w=d.size/s2*W;res.push({...d,x,y:H1,w:Math.max(2,w-2),h:Math.max(2,H-H1-2)});x+=w;});
  return res;
}
const chgBg=c=>{if(c>=15)return'#780000';if(c>=8)return'#A31515';if(c>=3)return'#C03030';if(c>=0)return'#7A2020';if(c>=-5)return'#203060';if(c>=-12)return'#1A50A0';return'#0F1F70';};
const fiBg=fi=>{if(fi>2000)return{b:'#083A25',s:'#43D9A3'};if(fi>300)return{b:'#0D4F35',s:'#2E8B57'};if(fi>-300)return{b:'#1A2A40',s:'#446688'};if(fi>-2000)return{b:'#4A1515',s:'#E05050'};return{b:'#6A0A0A',s:'#FF5C5C'};};
const volFmt=s=>`${(s/1000).toFixed(1)}조`;
const fiFmt=fi=>`${fi>=0?'+':''}${fi.toLocaleString()}억`;

function tmap(stocks,mode,sel,onSel){
  const W=660,H=340;
  const lay=layout(stocks,W,H);
  const rects=lay.map(item=>{
    const fb=mode==='overlay'?fiBg(item.fi):null;
    const bg=mode==='flow'?chgBg(item.chg):fb.b;
    const str=sel===item.name?D.gold:(mode==='flow'?'#0A1020':fb.s);
    const isSel=sel===item.name;
    const sw=item.w>45&&item.h>27;
    const sc=item.w>60&&item.h>47;
    const sf=mode==='overlay'&&item.w>90&&item.h>67;
    const fs=Math.min(13,item.w*0.145);
    return `<g onclick="window.__sel('${item.name}')" style="cursor:pointer">
      <rect x="${item.x+1}" y="${item.y+1}" width="${item.w}" height="${item.h}" fill="${bg}" stroke="${str}" stroke-width="${isSel?2.5:1}" rx="3"/>
      ${sw?`<text x="${item.x+1+item.w/2}" y="${item.y+1+item.h/2-(sc?9:0)}" text-anchor="middle" fill="${D.white}" font-size="${fs}" font-weight="bold" pointer-events="none" font-family="Arial">${item.name}</text>`:''}
      ${sc?`<text x="${item.x+1+item.w/2}" y="${item.y+1+item.h/2+9}" text-anchor="middle" fill="${item.chg>=0?'#FF9999':'#9999FF'}" font-size="${Math.min(11,fs*0.85)}" pointer-events="none" font-family="Arial">${item.chg>=0?'+':''}${item.chg}%</text>`:''}
      ${sf?`<text x="${item.x+1+item.w/2}" y="${item.y+1+item.h/2+26}" text-anchor="middle" fill="${item.fi>=0?D.green:D.red}" font-size="${Math.min(10,fs*0.78)}" pointer-events="none" font-family="Arial">외국인 ${fiFmt(item.fi)}</text>`:''}
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${rects}</svg>`;
}

    content=`

        <b style="color:${D.green}">에너지 × 외국인 교집합 (Overlay)</b> — 블록 크기=거래대금, 색상=외국인 순매수 절대금액 · 금 6/20 기준<br>에너지(크기)와 외국인 매수(색상)가 동시에 강한 종목 = 진짜 주도주
      </div>
      <div style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap">${legend2}</div>
      <div style="background:${D.panel2};border-radius:10px;padding:8px;margin-bottom:10px">${tmap(stocks,'overlay',selOverlay,'overlay')}</div>
      <div style="background:${D.panel};border-radius:10px;padding:10px 14px;margin-bottom:8px;border:2px solid ${D.green}">
        <div style="color:${D.green};font-weight:bold;font-size:12px;margin-bottom:8px">★ 교집합 — 에너지 상위 + 외국인 매수 동시 포착 = 진짜 주도주</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">${interCards}</div>
      </div>
      ${quiet.length?`<div style="background:${D.panel};border-radius:10px;padding:10px 14px;margin-bottom:8px;border:1px solid #2E8B57">
        <div style="color:#2E8B57;font-weight:bold;font-size:12px;margin-bottom:8px">에너지 小 + 외국인 강매수 = 조용히 쌓는 종목 (숨은 교집합)</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">${quietCards}</div>
      </div>`:''}
      ${detail}`;
  }

  if(tab===2){
    const W=660,H=500,UX=55,UW=100,UH=46,KX=455,KW=162,KH=56;
    const edges=EDGES.map(e=>{
      const fn=US_NODES.find(n=>n.id===e.from),tn=KR_NODES.find(n=>n.id===e.to);
      if(!fn||!tn)return'';
      const x1=UX+UW,y1=fn.y+UH/2,x2=KX,y2=tn.y+KH/2;
      const isH=hovGraph===e.from||hovGraph===e.to;
      const sw=Math.max(1.5,e.str*7);
      const midX=(x1+x2)/2,midY=(y1+y2)/2;
      return`<g>
        <path d="M${x1},${y1} C${x1+110},${y1} ${x2-110},${y2} ${x2},${y2}" fill="none" stroke="${isH?D.gold:'rgba(240,192,64,0.35)'}" stroke-width="${isH?sw+1:sw}" opacity="${isH?1:0.5}" stroke-linecap="round"/>
        ${isH?`<rect x="${midX-62}" y="${midY-12}" width="124" height="20" rx="5" fill="${D.panel2}" stroke="${D.gold}" stroke-width="0.8"/><text x="${midX}" y="${midY+2}" text-anchor="middle" fill="${D.gold}" font-size="10" font-weight="bold" font-family="Arial">${e.label}</text>`:''}
      </g>`;
    }).join('');
    const unodes=US_NODES.map(n=>{
      const isH=hovGraph===n.id;
      return`<g onmouseenter="window.__hov('${n.id}')" onmouseleave="window.__hov(null)" style="cursor:pointer">
        <rect x="${UX}" y="${n.y}" width="${UW}" height="${UH}" rx="8" fill="${isH?'#1A3F6A':D.panel2}" stroke="${isH?D.gold:D.blue}" stroke-width="${isH?2:1}"/>
        <text x="${UX+UW/2}" y="${n.y+18}" text-anchor="middle" fill="${D.white}" font-size="16" font-weight="bold" font-family="Arial">${n.label}</text>
        <text x="${UX+UW/2}" y="${n.y+34}" text-anchor="middle" fill="${D.red}" font-size="12" font-family="Arial">${n.sub}</text>
      </g>`;
    }).join('');
    const knodes=KR_NODES.map(n=>{
      const isH=hovGraph===n.id;
      return`<g onmouseenter="window.__hov('${n.id}')" onmouseleave="window.__hov(null)" style="cursor:pointer">
        <rect x="${KX}" y="${n.y}" width="${KW}" height="${KH}" rx="8" fill="${isH?(n.neg?'#3A0A0A':'#0D3A25'):D.panel2}" stroke="${isH?D.gold:(n.neg?D.red:D.green)}" stroke-width="${isH?2:1}"/>
        <text x="${KX+KW/2}" y="${n.y+19}" text-anchor="middle" fill="${D.white}" font-size="13" font-weight="bold" font-family="Arial">${n.label}</text>
        <text x="${KX+KW/2}" y="${n.y+34}" text-anchor="middle" fill="${n.neg?D.blue:D.red}" font-size="11" font-family="Arial">${n.sub}</text>
        <text x="${KX+KW/2}" y="${n.y+49}" text-anchor="middle" fill="${n.neg?D.red:D.green}" font-size="9" opacity="0.85" font-family="Arial">외국인 ${n.fi}</text>
      </g>`;
    }).join('');
    content=`
      <div style="background:${D.panel2};border-radius:8px;padding:8px 12px;margin-bottom:10px;border-left:3px solid ${D.blue};font-size:11px;color:${D.sub};line-height:1.7">
        <b style="color:${D.blue}">진원지 → 한국 연결 (Object Graph)</b> — 미국 종목이 한국 종목으로 에너지를 어떻게 전이시키는지<br>선 굵기=연결 강도 · 종목 위에 마우스를 올리면 연결 경로와 관계 설명이 강조됩니다
      </div>
      <div style="background:${D.panel2};border-radius:10px;padding:8px;margin-bottom:10px">
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
          <text x="${UX+UW/2}" y="28" text-anchor="middle" fill="${D.blue}" font-size="13" font-weight="bold" font-family="Arial">미국 진원지</text>
          <text x="${UX+UW/2}" y="42" text-anchor="middle" fill="${D.muted}" font-size="9" font-family="Arial">주간 등락률</text>
          <text x="${KX+KW/2}" y="28" text-anchor="middle" fill="${D.green}" font-size="13" font-weight="bold" font-family="Arial">한국 수혜·연동주</text>
          <text x="${KX+KW/2}" y="42" text-anchor="middle" fill="${D.muted}" font-size="9" font-family="Arial">주간 · 외국인(주간)</text>
          ${edges}${unodes}${knodes}
          <text x="${W/2}" y="${H-8}" text-anchor="middle" fill="${D.muted}" font-size="9" font-family="Arial">선 굵기=연결 강도(공급망·수요 상관도) · hover → 경로 강조</text>
        </svg>
      </div>
      <div style="background:${D.panel};border-radius:10px;padding:10px 14px;border:1px solid ${D.gold}">
        <div style="color:${D.gold};font-weight:bold;font-size:12px;margin-bottom:6px">주식맥락 인사이트 — 진원지·에너지·외국인 연결 구조</div>
        <div style="color:${D.sub};font-size:11px;line-height:1.9">
          WDC·MU·STX 동반 급등 → <b style="color:${D.green}">SK하이닉스</b> HBM·DRAM 직결. 외국인 주간 +700억 (주 후반 차익실현으로 둔화)<br>
          MU·ARM AI 수요 → <b style="color:${D.green}">삼성전기</b> MLCC 탑재 632% 폭증. 외국인 주간 +2,400억 → 이번 주 교집합 1위<br>
          AMAT 장비 → <b style="color:${D.red}">한미반도체</b> 역행 -18% (단기 급등 해소, 수급 이탈 — 그래프의 음영 포인트)<br>
          이란 종전 → <b style="color:${D.green}">한화오션</b>은 이 그래프 밖 별도 진원지(지정학). 에너지 小이지만 외국인 주간 +2,536억
        </div>
      </div>`;
  }

  document.getElementById('root').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div style="width:8px;height:8px;border-radius:4px;background:${D.gold}"></div>
      <span style="font-weight:bold;font-size:16px">주식맥락</span>
      <span style="color:${D.muted};font-size:9px;letter-spacing:2px">STOCK CONTEXT</span>
      <div style="flex:1"></div>
      <span style="color:${D.gold};font-size:10px">6월 3주차 · 종목 에너지 분석 샘플</span>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid ${D.panel}">${tabBar}</div>
    ${content}
    <div style="text-align:center;margin-top:12px;color:${D.muted};font-size:9px;border-top:1px solid ${D.panel};padding-top:8px">
      진원지·에너지·외국인으로 읽는다 · 샘플 데이터 (구조 검증용, 실제 수치와 상이할 수 있음)
    </div>`;
}

window.__tab=i=>{state.tab=i;state.selFlow=null;state.selOverlay=null;render();};
window.__day=i=>{state.dayIdx=i;state.selFlow=null;render();};
window.__sel=name=>{state.selFlow=state.selFlow===name?null:name;render();};
window.__ov=name=>{state.selOverlay=state.selOverlay===name?null:name;render();};
window.__hov=id=>{state.hovGraph=id;render();};

render();
</script>
